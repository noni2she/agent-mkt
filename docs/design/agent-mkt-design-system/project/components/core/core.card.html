<!-- @dsCard group="Components" viewport="700x340" name="Core · buttons, badges, avatar, nav" subtitle="Button / IconButton / Badge / Avatar / Card / NavItem" -->
<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
  .lbl { font: var(--fw-medium) var(--fs-xs)/1 var(--font-mono); letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-faint); width: 100%; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Badge, Avatar, Card, NavItem } = window.AgentMktDesignSystem_ec4390;
  const I = (n) => <i data-lucide={n}></i>;
  function Demo() {
    return (
      <div>
        <div className="group">
          <span className="lbl">Button · variants</span>
          <Button variant="primary" icon={I("check")}>通過並送出</Button>
          <Button variant="secondary">稍後再看</Button>
          <Button variant="ghost" icon={I("arrow-down")}>跳過</Button>
          <Button variant="danger" icon={I("x")}>拒絕</Button>
          <Button variant="primary" disabled icon={I("check")}>不可送出</Button>
        </div>
        <div className="group">
          <span className="lbl">Sizes · IconButton · Badge · Avatar</span>
          <Button size="sm" variant="primary" icon={I("radar")}>執行海巡</Button>
          <Button size="lg" variant="secondary">大型</Button>
          <IconButton icon={I("more-horizontal")} label="更多" variant="solid" />
          <IconButton icon={I("external-link")} label="原文" />
          <Badge tone="brand">reply</Badge>
          <Badge tone="success">已送出</Badge>
          <Badge tone="neutral" solid>12</Badge>
          <Avatar handle="@gecko.3379405" size={34} />
          <Avatar handle="mike88533" size={34} />
        </div>
        <div className="group" style={{ alignItems: "stretch" }}>
          <span className="lbl">Card · NavItem</span>
          <div style={{ width: 220, background: "var(--surface-card)", border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-lg)", padding: 8 }}>
            <NavItem icon={I("radar")} label="海巡" count={3} active />
            <NavItem icon={I("inbox")} label="審核佇列" count={12} />
            <NavItem icon={I("book-marked")} label="知識庫" />
          </div>
          <Card elevated style={{ flex: 1, minWidth: 220 }}>
            <div style={{ font: "var(--text-h3)", color: "var(--text-strong)", marginBottom: 6 }}>Card</div>
            <div style={{ font: "var(--text-small)", color: "var(--text-muted)" }}>白色卡面、1px 細邊、12px 圓角、冷灰陰影。</div>
          </Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  setTimeout(() => window.lucide && lucide.createIcons(), 60);
</script>
</body>
</html>
