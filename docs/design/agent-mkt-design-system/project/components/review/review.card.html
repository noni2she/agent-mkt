<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 14px; }
  .lbl { font: var(--fw-medium) var(--fs-xs)/1 var(--font-mono); letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-faint); width: 100%; margin-bottom: 2px; }
  .alerts { display: flex; flex-direction: column; gap: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { StatusChip, MetricChip, AlertBar } = window.AgentMktDesignSystem_ec4390;
  function Demo() {
    return (
      <div>
        <div className="group">
          <span className="lbl">StatusChip</span>
          <StatusChip status="pending" />
          <StatusChip status="approved" />
          <StatusChip status="sent" />
          <StatusChip status="blocked" />
          <StatusChip status="later" />
          <StatusChip status="relevant" />
        </div>
        <div className="group">
          <span className="lbl">MetricChip</span>
          <MetricChip kind="likes" value="954" />
          <MetricChip kind="replies" value="148" />
          <MetricChip kind="age" value="301h" />
          <MetricChip kind="followers" value="1.2k" />
        </div>
        <div className="alerts">
          <span className="lbl">AlertBar</span>
          <AlertBar tone="danger" title="硬規則命中（不可送出）">不得提供醫療、法律、投資建議</AlertBar>
          <AlertBar tone="warning" title="通過率 ≥ 95%，可能審核疲勞">請確認你有逐條讀過原文。</AlertBar>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  setTimeout(() => window.lucide && lucide.createIcons(), 80);
</script>
</body>
</html>
