<!-- @dsCard group="Colors" viewport="700x150" name="Neutral · ink & paper" subtitle="Cool-neutral ink scale on warm paper — does all structural work" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .sw { border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 50px; }
  .lab { padding: 5px 7px; background: var(--surface-card); }
  .name { font: var(--fw-medium) 11px/1.3 var(--font-mono); color: var(--text-strong); }
  .hex { font: 10px/1.3 var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-950)"></div><div class="lab"><div class="name">950</div><div class="hex">14171a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="lab"><div class="name">800</div><div class="hex">262b31</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><div class="lab"><div class="name">600</div><div class="hex">4c545d</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="lab"><div class="name">500</div><div class="hex">69727b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><div class="lab"><div class="name">300</div><div class="hex">b6bdc4</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-200)"></div><div class="lab"><div class="name">200</div><div class="hex">d7dbe0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-100)"></div><div class="lab"><div class="name">100</div><div class="hex">edeff1</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="lab"><div class="name">paper</div><div class="hex">fcfcfb</div></div></div>
  </div>
</body>
</html>
