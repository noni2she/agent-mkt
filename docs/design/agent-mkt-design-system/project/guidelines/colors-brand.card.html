<!-- @dsCard group="Colors" viewport="700x150" name="Brand · patrol teal" subtitle="The single brand accent — go / safe / approved" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .sw { border-radius: var(--radius-md); border: 1px solid var(--border-subtle); overflow: hidden; }
  .chip { height: 56px; }
  .lab { padding: 6px 8px; background: var(--surface-card); }
  .name { font: var(--fw-medium) 12px/1.3 var(--font-mono); color: var(--text-strong); }
  .hex { font: 11px/1.3 var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--brand-50)"></div><div class="lab"><div class="name">50</div><div class="hex">#ecf7f3</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-100)"></div><div class="lab"><div class="name">100</div><div class="hex">#d4efe7</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-300)"></div><div class="lab"><div class="name">300</div><div class="hex">#6fc9b3</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-500)"></div><div class="lab"><div class="name">500</div><div class="hex">#12a07f</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-600);outline:2px solid var(--brand-900);outline-offset:-2px"></div><div class="lab"><div class="name">600 ◆</div><div class="hex">#0d8268</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-700)"></div><div class="lab"><div class="name">700</div><div class="hex">#0a6856</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-900)"></div><div class="lab"><div class="name">900</div><div class="hex">#064f41</div></div></div>
  </div>
</body>
</html>
