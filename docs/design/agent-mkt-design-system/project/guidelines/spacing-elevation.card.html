<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Cool-grey shadows, never pure black — xs / card / pop / modal" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 28px; }
  .item { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .box { width: 110px; height: 70px; background: var(--surface-card); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); }
  .n { font: 11px/1 var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="n">xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-card)"></div><div class="n">card</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-pop)"></div><div class="n">pop</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-modal)"></div><div class="n">modal</div></div>
  </div>
</body>
</html>
