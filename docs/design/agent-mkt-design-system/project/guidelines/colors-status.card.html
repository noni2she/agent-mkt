<!-- @dsCard group="Colors" viewport="700x190" name="Status semantics" subtitle="Decision states as soft tinted capsules — go / caution / stop / info" -->
<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cap {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border-radius: var(--radius-lg);
    font-size: var(--fs-sm);
  }
  .dot { width: 10px; height: 10px; border-radius: var(--radius-pill); flex: none; }
  .k { font-weight: var(--fw-bold); }
  .m { color: inherit; opacity: .8; }
  .go   { background: var(--success-soft); border: 1px solid var(--success-bd); color: var(--success-text); }
  .warn { background: var(--warning-soft); border: 1px solid var(--warning-bd); color: var(--warning-text); }
  .stop { background: var(--danger-soft);  border: 1px solid var(--danger-bd);  color: var(--danger-text); }
  .info { background: var(--info-soft);    border: 1px solid var(--info-bd);    color: var(--info-text); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cap go"><span class="dot" style="background:var(--success)"></span><span class="k">通過</span><span class="m">go · approved · 可送出</span></div>
    <div class="cap warn"><span class="dot" style="background:var(--warning)"></span><span class="k">待審</span><span class="m">caution · pending · 審核疲勞</span></div>
    <div class="cap stop"><span class="dot" style="background:var(--danger)"></span><span class="k">命中硬規則</span><span class="m">stop · 不可送出</span></div>
    <div class="cap info"><span class="dot" style="background:var(--info)"></span><span class="k">稍後再看</span><span class="m">info · neutral</span></div>
  </div>
</body>
</html>
