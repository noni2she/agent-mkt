<!-- @dsCard group="Brand" viewport="700x170" name="Iconography · Lucide" subtitle="Monoline 1.75 stroke — Scout / reply / approve / hard-rule" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin: 0; padding: 20px 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .glyph { width: 44px; height: 44px; display: grid; place-items: center; background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); color: var(--text-strong); }
  .glyph svg { width: 21px; height: 21px; }
  .nm { font: 10.5px/1 var(--font-mono); color: var(--text-muted); }
  .brand { color: var(--brand-600); }
</style>
</head>
<body>
  <div class="row">
    <div class="ic"><div class="glyph brand"><i data-lucide="radar"></i></div><div class="nm">radar · 海巡</div></div>
    <div class="ic"><div class="glyph"><i data-lucide="message-square-reply"></i></div><div class="nm">reply</div></div>
    <div class="ic"><div class="glyph"><i data-lucide="pen-line"></i></div><div class="nm">post</div></div>
    <div class="ic"><div class="glyph" style="color:var(--success)"><i data-lucide="check"></i></div><div class="nm">approve</div></div>
    <div class="ic"><div class="glyph" style="color:var(--danger)"><i data-lucide="shield-alert"></i></div><div class="nm">hard-rule</div></div>
    <div class="ic"><div class="glyph" style="color:var(--warning)"><i data-lucide="triangle-alert"></i></div><div class="nm">caution</div></div>
    <div class="ic"><div class="glyph"><i data-lucide="clock"></i></div><div class="nm">pending</div></div>
    <div class="ic"><div class="glyph"><i data-lucide="users"></i></div><div class="nm">followers</div></div>
    <div class="ic"><div class="glyph" style="color:var(--coral-600)"><i data-lucide="heart"></i></div><div class="nm">likes</div></div>
    <div class="ic"><div class="glyph"><i data-lucide="book-marked"></i></div><div class="nm">knowledge</div></div>
    <div class="ic"><div class="glyph"><i data-lucide="x"></i></div><div class="nm">skip</div></div>
    <div class="ic"><div class="glyph"><i data-lucide="arrow-down"></i></div><div class="nm">later</div></div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
