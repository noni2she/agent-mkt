<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Two-tone paper → card → sunken → inset → ink" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .tile { height: 78px; border-radius: var(--radius-lg); border: 1px solid var(--border-default);
          display: flex; align-items: flex-end; padding: 10px; }
  .t { font: var(--fw-medium) 11px/1.3 var(--font-mono); color: var(--text-muted); }
  .ink .t { color: var(--ink-300); }
</style>
</head>
<body>
  <div class="row">
    <div class="tile" style="background:var(--surface-page)"><span class="t">page</span></div>
    <div class="tile" style="background:var(--surface-card);box-shadow:var(--shadow-card)"><span class="t">card</span></div>
    <div class="tile" style="background:var(--surface-sunken)"><span class="t">sunken</span></div>
    <div class="tile" style="background:var(--surface-inset)"><span class="t">inset</span></div>
    <div class="tile ink" style="background:var(--surface-ink);border-color:var(--ink-800)"><span class="t">ink</span></div>
  </div>
</body>
</html>
