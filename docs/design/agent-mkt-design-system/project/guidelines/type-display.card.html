<!-- @dsCard group="Type" viewport="700x200" name="Display & Title · Noto Serif TC" subtitle="Editorial serif for marketing headlines & page titles" -->
<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--surface-page); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .spec { font: 11px/1 var(--font-mono); color: var(--text-faint); white-space: nowrap; width: 96px; flex: none; }
  .display { font: var(--text-display); letter-spacing: var(--ls-tight); color: var(--text-strong); }
  .title   { font: var(--text-title);   letter-spacing: var(--ls-tight); color: var(--text-strong); }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="spec">display · 44 / 900</span><span class="display">海巡每一篇熱門貼文</span></div>
    <div class="row"><span class="spec">title · 30 / 700</span><span class="title">送出永遠由人觸發</span></div>
  </div>
</body>
</html>
