<!-- @dsCard group="Brand" viewport="700x170" name="Logo lockups" subtitle="Scout-ping mark + wordmark, on paper and ink" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .panel { display: flex; align-items: center; gap: 14px; padding: 22px; border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); }
  .paper { background: var(--surface-card); }
  .ink { background: var(--surface-ink); }
  img { height: 30px; display: block; }
  .mk { height: 40px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="panel paper"><img class="mk" src="../assets/logo-mark.svg" alt="mark"><img src="../assets/logo-wordmark.svg" alt="agent-mkt"></div>
    <div class="panel ink"><img src="../assets/logo-wordmark-inverse.svg" alt="agent-mkt inverse"></div>
  </div>
</body>
</html>
