// ── Micro components ───────────────────────────────────────────────────
function Ic({ n, size=18, style }) {
  return <span className="ic" style={{ width:size, height:size, ...style }}><i data-lucide={n}></i></span>;
}

function Btn({ children, variant="secondary", size="md", icon, disabled, onClick, full, style }) {
  const [hov, setHov] = React.useState(false);
  const s = { sm:{ h:30, px:10, fs:12.5, gap:5 }, md:{ h:36, px:14, fs:13.5, gap:7 }, lg:{ h:44, px:18, fs:15, gap:8 } }[size];
  const pal = {
    primary:{ bg:"var(--brand)", c:"#fff", bd:"var(--brand)", hbg:"var(--brand-hover)", hbd:"var(--brand-hover)" },
    secondary:{ bg:"var(--surface-card)", c:"var(--text-strong)", bd:"var(--border-default)", hbg:"var(--surface-inset)", hbd:"var(--border-strong)" },
    ghost:{ bg:"transparent", c:"var(--text-body)", bd:"transparent", hbg:"var(--surface-inset)", hbd:"transparent" },
    danger:{ bg:"var(--surface-card)", c:"var(--danger-text)", bd:"var(--danger-bd)", hbg:"var(--danger-soft)", hbd:"var(--danger)" },
  }[variant];
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ display:"inline-flex", alignItems:"center", justifyContent:"center",
        gap:s.gap, height:s.h, padding:`0 ${s.px}px`, width:full?"100%":"auto",
        font:`500 ${s.fs}px/1 var(--font-sans)`,
        color: pal.c, background: hov&&!disabled ? pal.hbg : pal.bg,
        border:`1px solid ${hov&&!disabled ? pal.hbd : pal.bd}`,
        borderRadius:"var(--radius-md)", opacity:disabled?0.42:1,
        cursor:disabled?"not-allowed":"pointer",
        transition:"background 120ms, border-color 120ms",
        whiteSpace:"nowrap", ...style }}>
      {icon && <span className="ic" style={{ width:s.h*0.44, height:s.h*0.44 }}>{icon}</span>}
      {children}
    </button>
  );
}

function Chip({ tone="neutral", label, dot=true }) {
  const t = {
    neutral:{ s:"var(--surface-inset)", bd:"var(--border-default)", tx:"var(--text-muted)", d:"var(--ink-400)" },
    brand:{ s:"var(--brand-soft)", bd:"var(--brand-soft-bd)", tx:"var(--brand-700)", d:"var(--brand)" },
    success:{ s:"var(--success-soft)", bd:"var(--success-bd)", tx:"var(--success-text)", d:"var(--success)" },
    warning:{ s:"var(--warning-soft)", bd:"var(--warning-bd)", tx:"var(--warning-text)", d:"var(--warning)" },
    danger:{ s:"var(--danger-soft)", bd:"var(--danger-bd)", tx:"var(--danger-text)", d:"var(--danger)" },
    info:{ s:"var(--info-soft)", bd:"var(--info-bd)", tx:"var(--info-text)", d:"var(--info)" },
  }[tone];
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"3px 10px 3px 8px",
      font:`700 11px/1.5 var(--font-sans)`, color:t.tx, background:t.s,
      border:`1px solid ${t.bd}`, borderRadius:"var(--radius-pill)", whiteSpace:"nowrap" }}>
      {dot && <span style={{ width:7, height:7, borderRadius:"50%", background:t.d, flexShrink:0 }} />}
      {label}
    </span>
  );
}

function Alert({ tone="warning", title, body }) {
  const t = {
    danger:{ s:"var(--danger-soft)", bd:"var(--danger-bd)", tx:"var(--danger-text)", ic:"var(--danger)", icon:"shield-alert" },
    warning:{ s:"var(--warning-soft)", bd:"var(--warning-bd)", tx:"var(--warning-text)", ic:"var(--warning)", icon:"triangle-alert" },
    info:{ s:"var(--info-soft)", bd:"var(--info-bd)", tx:"var(--info-text)", ic:"var(--info)", icon:"info" },
  }[tone];
  return (
    <div role="alert" style={{ display:"flex", gap:10, padding:"11px 14px",
      background:t.s, border:`1px solid ${t.bd}`, borderRadius:"var(--radius-lg)" }}>
      <Ic n={t.icon} size={17} style={{ color:t.ic, flexShrink:0, marginTop:1 }} />
      <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
        {title && <div style={{ font:`600 13px/1.4 var(--font-sans)`, color:t.tx }}>{title}</div>}
        {body && <div style={{ font:`13px/1.55 var(--font-sans)`, color:t.tx, opacity:.9 }}>{body}</div>}
      </div>
    </div>
  );
}

function NavRow({ icon, label, active, count, onClick }) {
  const [hov, setHov] = React.useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ display:"flex", alignItems:"center", gap:10, width:"100%", padding:"8px 10px",
        font:`500 13.5px/1 var(--font-sans)`, textAlign:"left",
        color: active?"var(--brand-700)":"var(--text-body)",
        background: active?"var(--brand-soft)": hov?"var(--surface-inset)":"transparent",
        border:`1px solid ${active?"var(--brand-soft-bd)":"transparent"}`,
        borderRadius:"var(--radius-md)", cursor:"pointer",
        transition:"background 120ms" }}>
      <span className="ic" style={{ width:17, height:17,
        color:active?"var(--brand-600)":"var(--text-muted)" }}>{icon}</span>
      <span style={{ flex:1 }}>{label}</span>
      {count != null && (
        <span style={{ font:`700 11px/1 var(--font-mono)`, padding:"2px 7px",
          color:active?"var(--brand-700)":"var(--text-muted)",
          background:active?"var(--white)":"var(--surface-inset)",
          border:"1px solid var(--border-subtle)", borderRadius:"var(--radius-pill)" }}>
          {count}
        </span>
      )}
    </button>
  );
}

                <i data-lucide="file-text"/>

                <div style={{ font:`600 14px/1.3 var(--font-sans)`, color:"var(--text-strong)", marginBottom:4 }}>{item.title}</div>

// ── Review Screen ──────────────────────────────────────────────────────
function PostBlock({ post }) {
  const age = post.posted_at ? (() => {
    const h = Math.round((Date.now() - new Date(post.posted_at))/3.6e6);
    return h < 24 ? h+"h內" : Math.round(h/24)+"天前";
  })() : "";
  return (
    <div style={{ background:"var(--surface-inset)", border:"1px solid var(--border-subtle)",
      borderRadius:"var(--radius-lg)", padding:16 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:9 }}>
          <AvatarMini handle={post.author_handle} />
          <a href={post.url} target="_blank" rel="noreferrer"
            style={{ font:`600 13.5px/1 var(--font-sans)`, color:"var(--text-strong)", textDecoration:"none" }}>
            @{post.author_handle}
          </a>
          {age && <span style={{ font:`12px/1 var(--font-mono)`, color:"var(--text-faint)" }}>{age}</span>}
        </div>
        <div style={{ display:"flex", gap:6 }}>
          <MetricPill emoji="👍" value={post.likes} />
          <MetricPill emoji="💬" value={post.replies} />
        </div>
      </div>
      <div style={{ font:`14.5px/var(--lh-body) var(--font-sans)`, color:"var(--text-body)",
        whiteSpace:"pre-wrap", wordBreak:"break-word" }}>{post.text}</div>
      {post.thread_excerpt && post.thread_excerpt.length > 0 && (
        <div style={{ marginTop:10, paddingTop:10, borderTop:"1px solid var(--border-subtle)",
          font:`12.5px/1.5 var(--font-sans)`, color:"var(--text-muted)" }}>
          留言串氣氛：{post.thread_excerpt.join(" ｜ ")}
        </div>
      )}
    </div>
  );
}

function AvatarMini({ handle }) {
  const c = handle || "?";
  let h = 0; for (let i=0;i<c.length;i++) h=(h*31+c.charCodeAt(i))%360;
  return (
    <span style={{ width:28, height:28, borderRadius:"50%", flexShrink:0, display:"grid",
      placeItems:"center", fontSize:12, fontWeight:700,
      background:`oklch(0.92 0.05 ${h})`, color:`oklch(0.45 0.09 ${h})`,
      border:"1px solid var(--border-subtle)" }}>
      {c[0].toUpperCase()}
    </span>
  );
}

function MetricPill({ emoji, value }) {
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:4, padding:"3px 9px",
      font:`500 12px/1 var(--font-mono)`, color:"var(--text-body)",
      background:"var(--surface-card)", border:"1px solid var(--border-subtle)",
      borderRadius:"var(--radius-pill)", fontVariantNumeric:"tabular-nums" }}>
      <span style={{ fontSize:11 }}>{emoji}</span>
      {value >= 1000 ? (value/1000).toFixed(1)+"k" : value}
    </span>
  );
}

// ── Single review card ────────────────────────────────────────────────
function ReviewCard({ item, onApprove, onSkip }) {
  const [edited, setEdited] = React.useState(item.edited_draft ?? item.draft ?? "");
  const [busy, setBusy] = React.useState(false);
  const isEmpty = edited.trim() === "";
  const hasRule = item.rule_flags.length > 0;
  const charLen = edited.length;

  const doApprove = () => {
    if (busy || hasRule || isEmpty) return;
    setBusy(true);
    setTimeout(() => { setBusy(false); onApprove(item.id, edited); }, 700);
  };

  const doSkip = () => onSkip(item.id);

  return (
    <div style={{ background:"var(--surface-card)", border:"1px solid var(--border-subtle)",
      borderRadius:"var(--radius-xl)", padding:"20px 22px",
      display:"flex", flexDirection:"column", gap:14,
      boxShadow:"var(--shadow-sm)" }}>



      {/* Rule flag alert */}
      {hasRule && <Alert tone="danger" title="硬規則命中（不可送出）" body={item.rule_flags.join("、")} />}

      {/* Original post */}
      {item.target_post && (
        <div>
          <div style={{ font:`600 11px/1 var(--font-mono)`, letterSpacing:"0.06em",
            textTransform:"uppercase", color:"var(--text-muted)", marginBottom:8 }}>
            原文（必讀上下文）
          </div>
          <PostBlock post={item.target_post} />
        </div>
      )}

      {/* Draft textarea */}
      <div>
        <div style={{ marginBottom:6 }}>
          <div style={{ font:`600 11px/1 var(--font-mono)`, letterSpacing:"0.06em",
            textTransform:"uppercase", color:"var(--text-muted)" }}>
            {isEmpty ? "AI 回應草稿（階段二尚未產生）" : "AI 草稿（可直接改寫）"}
          </div>
        </div>
        <textarea value={edited} onChange={e => setEdited(e.target.value)} rows={3}
          placeholder={isEmpty ? "目前僅海巡（階段一）。階段二將由 AI 為這篇貼文產生回應草稿。" : ""}
          style={{ width:"100%", resize:"vertical", boxSizing:"border-box",
            font:`15px/var(--lh-relaxed) var(--font-sans)`,
            color: isEmpty ? "var(--text-faint)" : "var(--text-strong)",
            background: isEmpty ? "var(--surface-sunken)" : "var(--surface-card)",
            border: isEmpty ? "1.5px dashed var(--border-strong)" : "1px solid var(--border-default)",
            borderRadius:"var(--radius-md)", padding:"10px 12px", outline:"none" }} />
      </div>

      {/* Actions */}
      <div style={{ display:"flex", gap:10, justifyContent:"flex-end", alignItems:"center" }}>
        <div style={{ flex:1, font:`12px/1.5 var(--font-sans)`, color:"var(--text-faint)" }}>
          {isEmpty ? "階段一：確認熱門貼文有正確撈回即可。" : "送出動作由你觸發，AI 不自動送。"}
        </div>
        <Btn variant="ghost" icon={<i data-lucide="x"/>} onClick={doSkip}>跳過</Btn>
        <Btn variant="primary"
          icon={busy ? <span className="ic spin"><i data-lucide="loader"/></span> : <i data-lucide="check"/>}
          disabled={busy || hasRule || isEmpty} onClick={doApprove}>
          核可
        </Btn>
      </div>
    </div>
  );
}

function ReviewScreen({ items, setItems }) {
  const [revCount, setRevCount] = React.useState(0);
  const [apprCount, setApprCount] = React.useState(0);
  const [toast, setToast] = React.useState(null);

  const pending = items.filter(it => it.status === "pending");
  const rate = revCount ? (apprCount / revCount * 100).toFixed(0) : 0;
  const fatigue = revCount >= 5 && apprCount / revCount >= 0.95;

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2200);
  };

  const handleApprove = (id, editedDraft) => {
    setItems(prev => prev.map(it => it.id === id ? { ...it, status:"sent", edited_draft:editedDraft } : it));
    setRevCount(c => c + 1);
    setApprCount(c => c + 1);
    showToast("✓ 已送出");
  };

  const handleSkip = (id) => {
    setItems(prev => prev.map(it => it.id === id ? { ...it, status:"rejected" } : it));
    setRevCount(c => c + 1);
    showToast("跳過", "neutral");
  };

  if (pending.length === 0) {
    return (
      <div style={{ flex:1, display:"grid", placeItems:"center" }}>
        <div style={{ textAlign:"center" }}>
          <span className="ic" style={{ width:48, height:48, color:"var(--text-faint)", margin:"0 auto 14px", display:"grid", placeItems:"center" }}>
            <i data-lucide="inbox"/>
          </span>
          <div style={{ font:`700 18px/1.3 var(--font-sans)`, color:"var(--text-strong)", marginBottom:8 }}>沒有待審項目</div>
          <div style={{ font:`14px/1.6 var(--font-sans)`, color:"var(--text-muted)" }}>先執行海巡，等 AI 產生草稿後再回來。</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      {/* Sub-header */}
      <div style={{ padding:"12px 28px", borderBottom:"1px solid var(--border-subtle)",
        background:"var(--surface-card)", display:"flex", alignItems:"center", gap:20, flexShrink:0 }}>
        <div style={{ font:`13px/1 var(--font-mono)`, color:"var(--text-muted)", fontVariantNumeric:"tabular-nums" }}>
          待審 <span style={{ color:"var(--text-strong)", fontWeight:700 }}>{pending.length}</span> 筆
        </div>
        <div style={{ font:`13px/1 var(--font-mono)`, color:"var(--text-muted)" }}>
          已審 <span style={{ color:"var(--text-strong)", fontWeight:600 }}>{revCount}</span>
          {"  "}通過率 <span style={{ color: parseFloat(rate) >= 95 ? "var(--warning-text)" : "var(--text-strong)", fontWeight:600 }}>
            {revCount ? rate + "%" : "–"}
          </span>
        </div>
      </div>

      {/* Scrollable feed of all items */}
      <div style={{ flex:1, overflowY:"auto", padding:"24px 36px 48px" }}>
        <div style={{ maxWidth:760, margin:"0 auto", display:"flex", flexDirection:"column", gap:20 }}>
          {fatigue && <Alert tone="warning" title="通過率 ≥ 95%，可能審核疲勞" body="請確認你有逐條讀過原文。" />}
          {pending.map(item => (
            <ReviewCard key={item.id} item={item} onApprove={handleApprove} onSkip={handleSkip} />
          ))}
        </div>
      </div>

      {/* Toast */}
      {toast && (
        <div style={{ position:"fixed", bottom:28, left:"50%", transform:"translateX(-50%)",
          padding:"10px 20px", borderRadius:"var(--radius-lg)",
          background: toast.type === "success" ? "var(--ink-900)" : "var(--ink-700)",
          color:"#fff", font:`500 13.5px/1 var(--font-sans)`,
          boxShadow:"var(--shadow-pop)", pointerEvents:"none" }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

// ── App ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = React.useState("review");
  const [items, setItems] = React.useState(QUEUE);
  const [scoutRunning, setScoutRunning] = React.useState(false);

  const pendingCount = items.filter(i => i.status==="pending").length;

  const runScout = () => {
    setScoutRunning(true);
    setTimeout(() => { setScoutRunning(false); setScreen("review"); }, 2400);
  };

  React.useEffect(() => {
    const t = setInterval(() => { if (window.lucide) { lucide.createIcons(); clearInterval(t); } }, 80);
    return () => clearInterval(t);
  }, [screen, items]);

  return (
    <div style={{ display:"flex", height:"100vh", background:"var(--surface-page)" }}>
      <Sidebar screen={screen} setScreen={setScreen} pendingCount={pendingCount} />
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        {/* Top nav bar */}
        <header style={{ height:52, borderBottom:"1px solid var(--border-subtle)",
          background:"var(--surface-card)", display:"flex", alignItems:"center",
          padding:"0 28px", gap:16, flexShrink:0 }}>
          <span style={{ font:`600 12px/1 var(--font-mono)`, letterSpacing:"0.08em",
            textTransform:"uppercase", color:"var(--text-muted)" }}>
            { screen==="scout"?"Scout · 海巡" : screen==="kb"?"知識庫" : "審核佇列" }
          </span>
          <div style={{ marginLeft:"auto", display:"flex", gap:10 }}>
            {screen==="review" && (
              <Btn variant="secondary" size="sm" icon={<i data-lucide="radar"/>}
                onClick={() => setScreen("scout")}>執行海巡</Btn>
            )}
          </div>
        </header>

        {screen==="scout" && <ScoutScreen running={scoutRunning} onRun={runScout} />}
        {screen==="review" && <ReviewScreen items={items} setItems={setItems} />}
        {screen==="kb" && <KBScreen />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
